<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thirty — Unlock Screen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .phone {
    width: 393px;
    height: 852px;
    background: #0a0a12;
    border-radius: 47px;
    border: 3px solid #2a2a3a;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 80px rgba(165, 148, 249, 0.08), 0 0 0 1px rgba(165, 148, 249, 0.05);
  }

  /* Notch */
  .notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 34px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 12px;
    left: 30px;
    right: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5;
  }
  .status-time {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: #e8e4df;
  }
  .status-icons {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .status-icons svg { width: 18px; height: 18px; fill: #e8e4df; }

  /* Subtle background orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 {
    width: 200px; height: 200px;
    background: rgba(165, 148, 249, 0.15);
    top: 20%; left: 10%;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 160px; height: 160px;
    background: rgba(249, 191, 148, 0.1);
    bottom: 25%; right: 10%;
    animation-delay: -4s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(10px, -15px); }
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
  }

  .title {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    color: #e8e4df;
    margin-bottom: 12px;
    font-weight: 400;
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: rgba(232, 228, 223, 0.5);
    margin-bottom: 40px;
    max-width: 320px;
    line-height: 24px;
    text-align: center;
  }

  .unlock-btn {
    padding: 14px 40px;
    border-radius: 40px;
    background: #a594f9;
    margin-bottom: 12px;
    cursor: pointer;
    border: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .unlock-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(165, 148, 249, 0.3);
  }

  .unlock-text {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: #0a0a12;
  }

  .price {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: rgba(232, 228, 223, 0.25);
    margin-bottom: 32px;
  }

  .restore {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: rgba(232, 228, 223, 0.25);
    text-decoration: underline;
    margin-bottom: 20px;
    cursor: pointer;
    background: none;
    border: none;
  }

  .back {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: rgba(232, 228, 223, 0.25);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(232, 228, 223, 0.2);
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="status-time">7:21 AM</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="content">
      <h1 class="title">you showed up today</h1>
      <p class="subtitle">unlock unlimited sessions for every moment you need a breath</p>
      <button class="unlock-btn"><span class="unlock-text">unlock thirty</span></button>
      <span class="price">$4.99 — one time, forever</span>
      <button class="restore">restore purchase</button>
      <button class="back">back</button>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
